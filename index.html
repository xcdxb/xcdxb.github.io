    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
        // 初始化 Supabase
        const supabaseUrl = 'YOUR_SUPABASE_URL';
        const supabaseKey = 'YOUR_SUPABASE_KEY';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // 注册功能
        async function signUp(email, password) {
            const { user, error } = await supabase.auth.signUp({ email, password });
            if (error) {
                alert('注册失败: ' + error.message);
            } else {
                alert('注册成功');
            }
        }

        // 登录功能
        async function signIn(email, password) {
            const { user, error } = await supabase.auth.signIn({ email, password });
            if (error) {
                alert('登录失败: ' + error.message);
            } else {
                alert('登录成功');
            }
        }

        // 更新积分显示
        async function updatePointsDisplay(userId) {
            const { data, error } = await supabase
                .from('users')
                .select('points')
                .eq('id', userId)
                .single();

            if (!error) {
                document.getElementById('points').textContent = `积分: ${data.points}`;
            }
        }

        // 增加积分
        async function addPoints(userId, points) {
            const { data, error } = await supabase
                .from('users')
                .upsert({ id: userId, points }, { onConflict: 'id' });

            if (!error) {
                updatePointsDisplay(userId);
            }
        }

        // 监听登录状态
        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                // 用户已登录
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('downloads-section').style.display = 'block';
                updatePointsDisplay(session.user.id);
            } else {
                // 用户未登录
                document.getElementById('auth-section').style.display = 'block';
                document.getElementById('downloads-section').style.display = 'none';
            }
        });

        // 下载文件时增加积分
        document.querySelectorAll('.download-item a').forEach(link => {
            link.addEventListener('click', async (e) => {
                const user = supabase.auth.user();
                if (user) {
                    e.preventDefault(); // 阻止默认跳转
                    await addPoints(user.id, 10); // 每次下载增加 10 积分
                    window.location.href = e.target.href; // 完成积分增加后跳转
                }
            });
        });
    </script>

            <input type="password" id="register-password" placeholder="密码" required>

            <input type="email" id="login-email" placeholder="邮箱" required>
            <input type="password" id="login-password" placeholder="密码" required>
            <button type="button" onclick="signIn(document.getElementById('login-email').value, document.getElementById('login-password').value)">登录</button>
