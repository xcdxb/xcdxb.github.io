<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册示例</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
        const supabaseUrl = 'https://mtceuatlkllejjrnwyvs.supabase.co';
        const supabaseKey = 'eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10Y2V1YXRsa2xsZWpqcm53eXZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE2MTIyNjMsImV4cCI6MjA1NzE4ODI2M30.JYzOhlYcuePl9244AZHdpxbEpmjEVoaLslRF-e6OZ-o';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // 注册功能
        async function signUp(email, password) {
            console.log('注册函数被调用');
            console.log('邮箱:', email, '密码:', password);

            const { user, error } = await supabase.auth.signUp({ email, password });
            if (error) {
                console.error('注册失败:', error);
                alert('注册失败: ' + error.message);
            } else {
                console.log('注册成功:', user);
                alert('注册成功');
            }
        }
    </script>
</head>
<body>
    <h1>注册</h1>
    <form id="register-form" onsubmit="event.preventDefault(); signUp(document.getElementById('register-email').value, document.getElementById('register-password').value);">
        <input type="email" id="register-email" placeholder="邮箱" required>
        <input type="password" id="register-password" placeholder="密码" required>
        <button type="submit">注册</button>
    </form>
</body>
</html>
